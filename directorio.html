<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intranet — Directorio</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .dept-tabs { display:flex; gap:6px; margin-bottom:20px; border-bottom:2px solid var(--border); padding-bottom:0; }
    .dept-tab { padding:8px 18px; border:none; background:transparent; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; color:var(--text-3); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .15s; }
    .dept-tab:hover { color:var(--text-1); }
    .dept-tab.active { color:var(--accent); border-bottom-color:var(--accent); }

    .dir-controls { display:flex; gap:12px; margin-bottom:20px; align-items:center; }
    .dir-search { flex:1; display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:9px 16px; }
    .dir-search:focus-within { border-color:var(--accent); }
    .dir-search input { border:none; background:transparent; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text-1); outline:none; width:100%; }
    .dir-search input::placeholder { color:var(--text-3); }

    .emp-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:16px; }

    .emp-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px; display:flex; flex-direction:column; align-items:center; text-align:center; gap:10px; box-shadow:var(--shadow); transition:all .18s; cursor:pointer; }
    .emp-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); border-color:var(--accent); }

    .emp-avatar { width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:600; color:#fff; flex-shrink:0; }
    .emp-name  { font-size:14px; font-weight:600; color:var(--text-1); }
    .emp-email { font-size:11px; color:var(--text-3); font-family:'DM Mono',monospace; }

    .emp-contact { display:flex; gap:8px; margin-top:4px; width:100%; }
    .emp-contact-btn { flex:1; padding:6px 0; border-radius:7px; border:1px solid var(--border); background:var(--surface-2); font-size:11px; color:var(--text-2); cursor:pointer; text-align:center; transition:all .12s; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:4px; }
    .emp-contact-btn:hover { background:var(--accent-light); color:var(--accent); border-color:var(--accent); }

    .empty-state { text-align:center; padding:48px; color:var(--text-3); }

    .ROLE_BADGE { display:inline-block; }
  </style>
</head>
<body>
<script src="nav.js"></script>

<div class="main">
  <header class="topbar">
    <span class="page-title">Directorio</span>
    <div class="topbar-search">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="#9298ad" stroke-width="1.8"><circle cx="9" cy="9" r="6"/><path d="M15 15l-3.5-3.5" stroke-linecap="round"/></svg>
      <input type="text" placeholder="Buscar empleado...">
    </div>
  </header>

  <div class="content">
    <div class="page-header">
      <h1>Directorio de empleados</h1>
      <p id="dir-subtitle">Cargando...</p>
    </div>

    <div class="dir-controls">
      <div class="dir-search">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="#9298ad" stroke-width="1.8"><circle cx="9" cy="9" r="6"/><path d="M15 15l-3.5-3.5" stroke-linecap="round"/></svg>
        <input type="text" id="search-input" placeholder="Buscar por nombre, email o departamento..." oninput="render()">
      </div>
      <select class="form-input" style="width:180px;" id="select-dept" onchange="switchDeptSelect(this.value)">
        <option value="todos">Todos los dptos.</option>
        <option value="Administración">Administración</option>
        <option value="Ventas">Ventas</option>
        <option value="Operaciones">Operaciones</option>
        <option value="Dirección">Dirección</option>
      </select>
    </div>


    <div class="dept-tabs" id="dept-tabs"></div>

    <div class="emp-grid" id="emp-grid"></div>

    <div class="empty-state" id="empty" style="display:none;">
      <div style="font-size:32px;margin-bottom:8px;">🔍</div>
      <div class="font-500" style="color:var(--text-2);">No se encontraron empleados</div>
      <div class="text-sm">Prueba con otro término de búsqueda</div>
    </div>
  </div>
</div>

<script>
  const COLORS = ['#4f6ef7','#22c55e','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#db2777','#0e7490','#16a34a','#d97706'];
  const ROLE_BADGE = {
    'Administración':'badge-blue','Ventas':'badge-green',
    'Operaciones':'badge-teal','Dirección':'badge-gray',
    'Administrador':'badge-red','Soporte IT':'badge-yellow','Empleado':'badge-gray'
  };

  function avatarColor(name) {
    let h = 0;
    for (const c of name) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
    return COLORS[Math.abs(h) % COLORS.length];
  }

  function getUsers() {
    const s = localStorage.getItem('all_users');
    if (s) return JSON.parse(s);
   
    return [];
  }


  const DEPTOS = ['Administración','Ventas','Operaciones','Dirección'];

  let currentDept = 'todos';

  function buildTabs() {
    const all   = getUsers().filter(u => DEPTOS.includes(u.role));
    const tabs  = document.getElementById('dept-tabs');
    const total = all.length;

    const depts = ['todos', ...DEPTOS];
    tabs.innerHTML = depts.map(d => {
      const count = d === 'todos' ? total : all.filter(u => u.role === d).length;
      const label = d === 'todos' ? `Todos (${count})` : `${d} (${count})`;
      return `<button class="dept-tab${currentDept===d?' active':''}" onclick="switchTab('${d}',this)">${label}</button>`;
    }).join('');

    document.getElementById('dir-subtitle').textContent =
      total + ' empleados · ' + DEPTOS.length + ' departamentos';
  }

  function switchTab(dept, btn) {
    currentDept = dept;
    document.querySelectorAll('.dept-tab').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    document.getElementById('select-dept').value = dept;
    render();
  }

  function switchDeptSelect(dept) {
    currentDept = dept;
    document.querySelectorAll('.dept-tab').forEach(b => {
      b.classList.toggle('active', b.textContent.startsWith(dept === 'todos' ? 'Todos' : dept));
    });
    render();
  }

  function render() {
    const q    = document.getElementById('search-input').value.toLowerCase();
    const all  = getUsers().filter(u => DEPTOS.includes(u.role));

    const filtered = all.filter(u => {
      const matchDept = currentDept === 'todos' || u.role === currentDept;
      const matchQ    = !q || u.name.toLowerCase().includes(q) || (u.user||'').toLowerCase().includes(q) || u.role.toLowerCase().includes(q);
      return matchDept && matchQ;
    });

    const grid = document.getElementById('emp-grid');
    grid.innerHTML = '';

    document.getElementById('empty').style.display = filtered.length === 0 ? '' : 'none';
    grid.style.display = filtered.length === 0 ? 'none' : '';

    filtered.forEach(u => {
      const initials = u.name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
      const color    = avatarColor(u.name);
      const badge    = ROLE_BADGE[u.role] || 'badge-gray';
      const email    = u.user || '';

      const card = document.createElement('div');
      card.className = 'emp-card';
      card.innerHTML = `
        <div class="emp-avatar" style="background:${color}">${initials}</div>
        <div class="emp-name">${u.name}</div>
        <span class="badge ${badge}">${u.role}</span>
        <div class="emp-email">${email}</div>
        <div class="emp-contact">
          <a class="emp-contact-btn" href="mailto:${email}">
            <svg width="12" height="12" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="2" y="4" width="16" height="12" rx="2"/><path d="M2 7l8 5 8-5"/></svg>
            Email
          </a>
          <a class="emp-contact-btn" href="tel:+34900000000">
            <svg width="12" height="12" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M5 2h4l2 4-2.5 1.5A11 11 0 0013.5 12L15 9.5l4 2v4a2 2 0 01-2 2A16 16 0 013 4a2 2 0 012-2z"/></svg>
            Llamar
          </a>
        </div>`;
      grid.appendChild(card);
    });
  }

  // Init
  buildTabs();
  render();
</script>
</body>
</html>
